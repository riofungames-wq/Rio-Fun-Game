<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 - Page Not Found | Rio Maggi Point</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    background: #050505;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

.container {
    width: 100%;
    max-width: 500px;
    background: #f5d99b;
    border: 3px solid #d19b4a;
    border-radius: 18px;
    padding: 35px;
    box-shadow: 0 15px 40px rgba(0,0,0,.45);
    text-align: center;
}

h1 {
    font-size: 80px;
    color: #c62828;
    margin-bottom: 10px;
}

h2 {
    font-size: 28px;
    color: #222;
    margin-bottom: 15px;
}

p {
    font-size: 16px;
    color: #555;
    line-height: 1.8;
    margin-bottom: 25px;
}

.bannerAd {
    height: 90px;
    border: 2px dashed #999;
    border-radius: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #fff;
    margin: 20px 0;
    font-weight: bold;
    color: #777;
}

button {
    width: 100%;
    padding: 14px;
    background: #263525;
    color: #ffd54f;
    border: none;
    border-radius: 10px;
    font-size: 17px;
    font-weight: bold;
    cursor: pointer;
    transition: .25s;
}

button:hover {
    background: #1c271b;
}
</style>
</head>

<body>

<div class="container">

    <h1>404</h1>

    <h2>😕 Page Not Found</h2>

    <p>
        Sorry! The page you are looking for doesn't exist
        or may have been moved.
    </p>

    <div class="bannerAd">
        Google AdSense Banner (Responsive)
    </div>

    <button id="homeBtn">
        🏠 Back to Home
    </button>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

    document.getElementById("homeBtn").addEventListener("click", () => {

        const customer = JSON.parse(
            localStorage.getItem("currentCustomer")
        );

        if (customer) {
            window.location.href = "profile.html";
        } else {
            window.location.href = "index.html";
        }

    });

});
</script>

</body>
</html>
