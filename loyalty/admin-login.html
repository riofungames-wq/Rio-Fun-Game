<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Rio Maggi Point - Admin Login</title>

    <!-- PWA Manifest & Favicon -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#263525">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: #f5d99b;
            border: 3px solid #d19b4a;
            border-radius: 18px;
            padding: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,.45);
        }

        h1 {
            text-align: center;
            color: #222;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #555;
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #222;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 18px;
            border: 2px solid #d19b4a;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
        }

        input:focus {
            border-color: #263525;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #263525;
            color: #ffd54f;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: .25s;
        }

        button:hover {
            background: #1c271b;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #errorMessage {
            display: none;
            margin-top: 15px;
            padding: 12px;
            background: #ffe0e0;
            color: #b00020;
            border: 1px solid #ff9999;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🔐 Admin Login</h1>

    <p class="subtitle">
        Authorized Access Only
    </p>

    <form id="adminLoginForm">

        <label for="email">
            Admin Email
        </label>

        <input
            type="email"
            id="email"
            placeholder="Enter Admin Email"
            autocomplete="email"
            required
        >

        <label for="password">
            Password
        </label>

        <input
            type="password"
            id="password"
            placeholder="Enter Password"
            autocomplete="current-password"
            required
        >

        <button type="submit" id="loginBtn">
            Login
        </button>

        <div id="errorMessage"></div>

    </form>

</div>


<!-- Firebase Admin Login -->
<script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

    import {
        getAuth,
        signInWithEmailAndPassword
    }
    from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";


    // Firebase Configuration
    const firebaseConfig = {

        apiKey: "AIzaSyS5ZmPaMW17YnUOvd48QhHXwS8it6XDB70",

        authDomain: "rio-maggi-point.firebaseapp.com",

        projectId: "rio-maggi-point",

        storageBucket: "rio-maggi-point.firebasestorage.app",

        messagingSenderId: "472858143171",

        appId: "1:472858143171:web:15cfb0b8de9cd25b957576"

    };


    // Initialize Firebase
    const app = initializeApp(firebaseConfig);

    // Initialize Firebase Authentication
    const auth = getAuth(app);


    // Get Elements
    const form = document.getElementById("adminLoginForm");

    const emailInput = document.getElementById("email");

    const passwordInput = document.getElementById("password");

    const loginBtn = document.getElementById("loginBtn");

    const errorMessage = document.getElementById("errorMessage");


    // Admin Login
    form.addEventListener("submit", async (event) => {

        event.preventDefault();

        const email = emailInput.value.trim();

        const password = passwordInput.value;


        // Hide old error
        errorMessage.style.display = "none";

        errorMessage.textContent = "";


        // Disable button
        loginBtn.disabled = true;

        loginBtn.textContent = "Logging in...";


        try {

            // Firebase Login
            await signInWithEmailAndPassword(
                auth,
                email,
                password
            );


            // Login Successful
            alert("Admin Login Successful!");


            // Go to Admin Panel
            window.location.href = "admin.html";


        } catch (error) {

            console.error("Login Error:", error);


            // Show Error
            errorMessage.style.display = "block";


            if (
                error.code === "auth/invalid-credential" ||
                error.code === "auth/invalid-login-credentials"
            ) {

                errorMessage.textContent =
                    "Invalid Email or Password.";

            } else if (
                error.code === "auth/too-many-requests"
            ) {

                errorMessage.textContent =
                    "Too many failed attempts. Please try again later.";

            } else {

                errorMessage.textContent =
                    "Login failed. Please check your Email and Password.";

            }


            // Enable button
            loginBtn.disabled = false;

            loginBtn.textContent = "Login";

        }

    });

</script>


<!-- Service Worker -->
<script>

if ("serviceWorker" in navigator) {

    window.addEventListener("load", () => {

        navigator.serviceWorker.register("./service-worker.js");

    });

}

</script>

</body>
</html>
