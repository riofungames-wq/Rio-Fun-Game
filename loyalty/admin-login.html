<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rio Maggi Point - Admin Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: #f5d99b;
            border: 3px solid #d19b4a;
            border-radius: 18px;
            padding: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,.45);
        }

        h1 {
            text-align: center;
            color: #222;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #555;
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #222;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 18px;
            border: 2px solid #d19b4a;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
        }

        input:focus {
            border-color: #263525;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #263525;
            color: #ffd54f;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: .25s;
        }

        button:hover {
            background: #1c271b;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🔐 Admin Login</h1>

    <p class="subtitle">
        Authorized Access Only
    </p>

    <form id="adminLoginForm">
        <label for="username">Admin Username</label>
        <input
            type="text"
            id="username"
            placeholder="Enter Admin Username"
            autocomplete="username"
            required
        >

        <label for="password">Password</label>
        <input
            type="password"
            id="password"
            placeholder="Enter Password"
            autocomplete="current-password"
            required
        >

        <button type="submit">
            Login
        </button>
    </form>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("adminLoginForm");

    form.addEventListener("submit", function(e) {
        e.preventDefault();

        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();

        // Default Admin Credentials
        const ADMIN_USERNAME = "admin";
        const ADMIN_PASSWORD = "123456";

        if (username !== ADMIN_USERNAME || password !== ADMIN_PASSWORD) {
            alert("Invalid Username or Password.");
            return;
        }

        localStorage.setItem("adminLoggedIn", "true");

        alert("Admin Login Successful!");
        window.location.href = "admin.html";
    });
});
</script>

</body>
</html>
