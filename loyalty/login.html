<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Rio Maggi Point - Login</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#263525">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Rio Maggi Point">
    <link rel="icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 430px;
            background: #f5d99b;
            border: 3px solid #d19b4a;
            border-radius: 18px;
            padding: 30px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, .45);
        }

        h1 {
            text-align: center;
            color: #222;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            margin-bottom: 25px;
            color: #555;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #222;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 18px;
            border: 2px solid #d19b4a;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: .25s;
        }

        input:focus {
            border-color: #263525;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #263525;
            color: #ffd54f;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: .25s;
        }

        button:hover {
            background: #1c271b;
        }

        .bottom {
            text-align: center;
            margin-top: 20px;
            font-size: 15px;
        }

        .bottom a {
            color: #c62828;
            font-weight: bold;
            text-decoration: none;
        }

        .bottom a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🔑 Login</h1>
    <p class="subtitle">Welcome Back to Rio Maggi Point</p>

    <form id="loginForm">
        <label>Email Address</label>
        <input
            type="email"
            id="email"
            placeholder="Enter your email"
            autocomplete="email"
            required
        >

        <label>Password</label>
        <input
            type="password"
            id="password"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
        >

        <button type="submit">Login</button>
    </form>

    <div class="bottom">
        Don't have an account? <a href="signup.html">Create Account</a>
    </div>
</div>

<script type="module">
    import { auth } from "./js/firebase-config.js";
    import {
        signInWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

    const loginForm = document.getElementById("loginForm");

    loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        if (!email) {
            alert("Please enter your email.");
            return;
        }

        if (password.length < 6) {
            alert("Please enter a valid password.");
            return;
        }

        try {
            await signInWithEmailAndPassword(
                auth,
                email,
                password
            );

            alert("Login Successful!");
            window.location.href = "index.html";

        } catch (error) {
            console.error(error);

            switch (error.code) {
                case "auth/invalid-credential":
                    alert("Invalid email or password.");
                    break;
                case "auth/user-not-found":
                    alert("Account not found.");
                    break;
                case "auth/wrong-password":
                    alert("Wrong password.");
                    break;
                case "auth/invalid-email":
                    alert("Invalid email address.");
                    break;
                default:
                    alert(error.message);
            }
        }
    });
</script>

<script>
    if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
            navigator.serviceWorker.register("./service-worker.js");
        });
    }
</script>

</body>
</html>
