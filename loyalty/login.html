<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rio Maggi Point - Login</title>

    <!-- PWA Manifest & Favicon Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#263525">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #050505;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: #f5d99b;
            border: 3px solid #d19b4a;
            border-radius: 18px;
            padding: 30px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.45);
        }

        h1 {
            text-align: center;
            color: #222;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #555;
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #222;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 18px;
            border: 2px solid #d19b4a;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: 0.25s;
        }

        input:focus {
            border-color: #263525;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #263525;
            color: #ffd54f;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.25s;
        }

        button:hover {
            background: #1c271b;
        }

        .bottom {
            text-align: center;
            margin-top: 20px;
            font-size: 15px;
        }

        .bottom a {
            color: #c62828;
            text-decoration: none;
            font-weight: bold;
        }

        .bottom a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🔑 Login</h1>

    <p class="subtitle">
        Welcome Back to Rio Maggi Point
    </p>

    <form id="loginForm">
        <label for="mobile">Mobile Number</label>

        <input
            type="tel"
            id="mobile"
            placeholder="Enter your registered mobile number"
            inputmode="numeric"
            maxlength="10"
            pattern="[0-9]{10}"
            autocomplete="tel"
            oninput="this.value = this.value.replace(/[^0-9]/g, '')"
            required
        >

        <button type="submit">
            Login
        </button>
    </form>

    <div class="bottom">
        Don't have an account?
        <a href="signup.html">Sign Up</a>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("loginForm");

    form.addEventListener("submit", function(e) {
        e.preventDefault();

        const mobile = document.getElementById("mobile").value.trim();

        if (!/^[0-9]{10}$/.test(mobile)) {
            alert("Please enter a valid 10-digit mobile number.");
            return;
        }

        const customers = JSON.parse(localStorage.getItem("customers")) || [];

        const customer = customers.find(user => user.mobile === mobile);

        if (!customer) {
            alert("Account not found. Please Sign Up first.");
            window.location.href = "signup.html";
            return;
        }

        localStorage.setItem("currentCustomer", JSON.stringify(customer));

        alert("Login Successful!");
        window.location.href = "index.html";
    });
});
</script>

<script>
if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js");
    });
}
</script>

</body>
</html>
