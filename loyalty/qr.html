<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Rio Maggi Point - My QR</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#263525">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Rio Maggi Point">

    <link rel="icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="icon-192.png">

    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .qr-card {
            width: 100%;
            max-width: 500px;
            background: #f5d99b;
            border: 3px solid #d19b4a;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,.55);
            text-align: center;
        }

        .header {
            background: linear-gradient(135deg, #f8dda0, #edc77d);
            padding: 25px 20px;
        }

        .brand {
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 1px;
            color: #222;
        }

        .brand span {
            color: #c62828;
        }

        .title {
            margin-top: 8px;
            font-size: 30px;
            font-weight: 900;
            color: #c62828;
        }

        .subtitle {
            margin-top: 8px;
            color: #444;
            font-size: 14px;
        }

        .customer-box {
            margin: 20px;
            padding: 15px;
            background: #263525;
            color: white;
            border-radius: 14px;
        }

        .welcome {
            font-size: 12px;
            letter-spacing: 2px;
            color: #f5d99b;
        }

        .customer-name {
            margin-top: 5px;
            font-size: 25px;
            font-weight: 900;
            color: #ffd54f;
            text-transform: uppercase;
        }

        .qr-area {
            margin: 20px;
            padding: 25px;
            background: white;
            border-radius: 18px;
            border: 3px solid #d19b4a;
        }

        #qrcode {
            width: 220px;
            height: 220px;
            margin: auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #qrcode img {
            max-width: 100%;
            height: auto;
        }

        .scan-text {
            margin-top: 18px;
            font-size: 15px;
            font-weight: bold;
            color: #263525;
        }

        .info {
            margin: 0 20px 20px;
            padding: 15px;
            background: #fff7df;
            border-radius: 12px;
            color: #444;
            font-size: 14px;
            line-height: 1.5;
        }

        .back-btn {
            width: calc(100% - 40px);
            margin: 0 20px 20px;
            padding: 14px;
            background: #263525;
            color: #ffd54f;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
        }

        .back-btn:hover {
            background: #1c271b;
        }

        .loading {
            padding: 40px;
            font-size: 18px;
            font-weight: bold;
            color: #263525;
        }

        @media(max-width: 450px) {

            .qr-area {
                margin: 15px;
                padding: 20px;
            }

            #qrcode {
                width: 200px;
                height: 200px;
            }

        }

    </style>

</head>

<body>

<div class="qr-card">

    <div class="header">

        <div class="brand">
            <span>▶</span> RIO MAGGI POINT
        </div>

        <div class="title">
            MY QR CODE
        </div>

        <div class="subtitle">
            Show this QR at Rio Maggi Point
        </div>

    </div>


    <div
        class="loading"
        id="loadingMessage"
    >
        Loading your QR Code...
    </div>


    <div
        id="qrContent"
        style="display:none;"
    >

        <div class="customer-box">

            <div class="welcome">
                CUSTOMER
            </div>

            <div
                class="customer-name"
                id="customerName"
            >
                Customer
            </div>

        </div>


        <div class="qr-area">

            <div id="qrcode"></div>

            <div class="scan-text">
                📱 Show this QR to Admin
            </div>

        </div>


        <div class="info">

            🔐 This QR Code is linked to your
            Rio Maggi Point loyalty account.

            <br><br>

            Your personal mobile number is
            <strong>not displayed</strong>
            in this QR Code.

        </div>


        <button
            class="back-btn"
            id="backBtn"
        >
            🏠 Back to Loyalty Card
        </button>

    </div>

</div>


<script type="module">

    import { auth, db } from "./js/firebase-config.js";

    import {
        onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

    import {
        doc,
        getDoc
    } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";


    const loadingMessage =
        document.getElementById("loadingMessage");

    const qrContent =
        document.getElementById("qrContent");

    const customerName =
        document.getElementById("customerName");

    const qrCode =
        document.getElementById("qrcode");


    // =========================
    // CHECK CUSTOMER LOGIN
    // =========================

    onAuthStateChanged(auth, async (user) => {

        if (!user) {

            window.location.href =
                "login.html";

            return;

        }


        try {

            // Get Customer Data

            const customerRef =
                doc(
                    db,
                    "customers",
                    user.uid
                );


            const customerSnap =
                await getDoc(customerRef);


            if (!customerSnap.exists()) {

                alert(
                    "Customer account data not found."
                );

                window.location.href =
                    "index.html";

                return;

            }


            const customer =
                customerSnap.data();


            // Show Customer Name

            customerName.textContent =
                customer.name ||
                "Customer";


            // =========================
            // CREATE PERMANENT QR
            // =========================

            // Only Firebase UID is stored
            // No mobile number
            // No email
            // No password

            const qrData =
                "RIO_MAGGI_CUSTOMER:" +
                user.uid;


            new QRCode(
                qrCode,
                {
                    text: qrData,
                    width: 220,
                    height: 220,
                    colorDark: "#000000",
                    colorLight: "#ffffff",
                    correctLevel:
                        QRCode.CorrectLevel.H
                }
            );


            // Show Page

            loadingMessage.style.display =
                "none";

            qrContent.style.display =
                "block";


        } catch (error) {

            console.error(
                "QR Error:",
                error
            );

            loadingMessage.textContent =
                "Unable to load QR Code.";

        }

    });


    // =========================
    // BACK BUTTON
    // =========================

    document
        .getElementById("backBtn")
        .addEventListener(
            "click",
            () => {

                window.location.href =
                    "index.html";

            }
        );


</script>


<script>

    if ("serviceWorker" in navigator) {

        window.addEventListener(
            "load",
            () => {

                navigator.serviceWorker.register(
                    "./service-worker.js"
                );

            }
        );

    }

</script>

</body>

</html>
