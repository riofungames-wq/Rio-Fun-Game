<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rio Maggi Point - Reward</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: #f5d99b;
            border: 3px solid #d19b4a;
            border-radius: 18px;
            padding: 30px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, .45);
            text-align: center;
        }

        h1 {
            color: #c62828;
            margin-bottom: 10px;
            font-size: 34px;
        }

        .subtitle {
            color: #555;
            margin-bottom: 25px;
        }

        .reward-box {
            background: #2e7d32;
            color: #fff;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .reward-box h2 {
            margin-bottom: 10px;
        }

        .card {
            background: #fff7df;
            border: 2px solid #d19b4a;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            text-align: left;
        }

        .label {
            font-size: 13px;
            font-weight: bold;
            color: #555;
            margin-bottom: 4px;
        }

        .value {
            font-size: 18px;
            font-weight: bold;
            color: #222;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #263525;
            color: #ffd54f;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: .25s;
        }

        button:hover {
            background: #1c271b;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🎉 Congratulations!</h1>

    <p class="subtitle">
        You have unlocked your reward.
    </p>

    <div class="reward-box">
        <h2>🍜 FREE VEG MAGGI</h2>
        <p>Your loyalty reward is ready to claim!</p>
    </div>

    <div class="card">
        <div class="label">Customer Name</div>
        <div class="value" id="customerName">Loading...</div>
    </div>

    <div class="card">
        <div class="label">Mobile Number</div>
        <div class="value" id="customerMobile">Loading...</div>
    </div>

    <div class="card">
        <div class="label">Total Stamps</div>
        <div class="value" id="customerStamps">6 / 6</div>
    </div>

    <button id="backBtn">
        Back to Profile
    </button>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const customer = JSON.parse(
        localStorage.getItem("currentCustomer")
    );

    if (!customer) {
        alert("Please Login First!");
        window.location.href = "login.html";
        return;
    }

    if (customer.stamps < 6 || customer.reward !== true) {
        alert("Reward is not unlocked yet!");
        window.location.href = "profile.html";
        return;
    }

    document.getElementById("customerName").textContent = customer.name;
    document.getElementById("customerMobile").textContent = customer.mobile;
    document.getElementById("customerStamps").textContent = customer.stamps + " / 6";

    document.getElementById("backBtn").addEventListener("click", () => {
        window.location.href = "profile.html";
    });
});
</script>

</body>
</html>
