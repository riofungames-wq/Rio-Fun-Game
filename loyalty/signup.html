<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Rio Maggi Point - Customer Signup</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#263525">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Rio Maggi Point">
    <link rel="icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 430px;
            background: #f5d99b;
            border: 3px solid #d19b4a;
            border-radius: 18px;
            padding: 30px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, .45);
        }

        h1 {
            text-align: center;
            color: #222;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            margin-bottom: 25px;
            color: #555;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #222;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 18px;
            border: 2px solid #d19b4a;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: .25s;
        }

        input:focus {
            border-color: #263525;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #263525;
            color: #ffd54f;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: .25s;
        }

        button:hover {
            background: #1c271b;
        }

        .bottom {
            text-align: center;
            margin-top: 20px;
            font-size: 15px;
        }

        .bottom a {
            color: #c62828;
            font-weight: bold;
            text-decoration: none;
        }

        .bottom a:hover {
            text-decoration: underline;
        }

        @media(max-width: 450px) {
            .container {
                padding: 22px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>👤 Create Account</h1>
    <p class="subtitle">Join Rio Maggi Point Loyalty Program</p>

    <form id="signupForm">
        <label>Full Name</label>
        <input
            type="text"
            id="name"
            placeholder="Enter your full name"
            autocomplete="name"
            required
        >

        <label>Mobile Number</label>
        <input
            type="tel"
            id="mobile"
            placeholder="Enter 10-digit mobile number"
            maxlength="10"
            inputmode="numeric"
            autocomplete="tel"
            oninput="this.value=this.value.replace(/[^0-9]/g,'')"
            required
        >

        <label>Email Address</label>
        <input
            type="email"
            id="email"
            placeholder="Enter your email"
            autocomplete="email"
            required
        >

        <label>Password</label>
        <input
            type="password"
            id="password"
            placeholder="Minimum 6 characters"
            required
        >

        <label>Confirm Password</label>
        <input
            type="password"
            id="confirmPassword"
            placeholder="Confirm password"
            required
        >

        <button type="submit">Create Account</button>
    </form>

    <div class="bottom">
        Already have an account? <a href="login.html">Login</a>
    </div>
</div>

<script type="module">
    import { auth, db } from "./js/firebase-config.js";
    import {
        createUserWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";
    import {
        doc,
        setDoc,
        collection,
        query,
        where,
        getDocs,
        serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

    const signupForm = document.getElementById("signupForm");

    signupForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const name = document.getElementById("name").value.trim();
        const mobile = document.getElementById("mobile").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirmPassword").value;

        if (name.length < 3) {
            alert("Please enter a valid name.");
            return;
        }

        if (!/^[0-9]{10}$/.test(mobile)) {
            alert("Please enter a valid 10-digit mobile number.");
            return;
        }

        if (password.length < 6) {
            alert("Password must be at least 6 characters.");
            return;
        }

        if (password !== confirmPassword) {
            alert("Passwords do not match.");
            return;
        }

        try {
            // Duplicate Mobile Check
            const q = query(
                collection(db, "customers"),
                where("mobile", "==", mobile)
            );

            const querySnapshot = await getDocs(q);

            if (!querySnapshot.empty) {
                alert("This mobile number is already registered.");
                return;
            }

            // Create Firebase User
            const userCredential = await createUserWithEmailAndPassword(
                auth,
                email,
                password
            );

            const user = userCredential.user;

            // Save Customer
            await setDoc(doc(db, "customers", user.uid), {
                uid: user.uid,
                name: name,
                mobile: mobile,
                email: email,
                stamps: 0,
                reward: false,
                status: "active",
                createdAt: serverTimestamp()
            });

            alert("Account Created Successfully!");
            window.location.href = "index.html";

        } catch (error) {
            console.error(error);

            switch (error.code) {
                case "auth/email-already-in-use":
                    alert("Email already registered.");
                    break;
                case "auth/invalid-email":
                    alert("Invalid email.");
                    break;
                case "auth/weak-password":
                    alert("Weak password.");
                    break;
                default:
                    alert(error.message);
            }
        }
    });
</script>

<script>
    if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
            navigator.serviceWorker.register("./service-worker.js");
        });
    }
</script>

</body>
</html>
