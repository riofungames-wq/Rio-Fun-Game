<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Rio Loyalty Club | Create Account</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#D4AF37">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Global CSS -->

    <link rel="stylesheet"
        href="css/style.css">

    <!-- Multi Step CSS -->

    <link rel="stylesheet"
        href="css/multistep-signup.css">

</head>

<body>

<div class="signup-page">

<div class="signup-card">

<!-- Logo -->

<div class="logo-box">

<img
src="assets/logo/logo.png"
alt="Rio Maggi Point">

<h2>Create Account</h2>

<p>

Rio Loyalty Club

</p>

</div>

<!-- Progress -->

<div class="progress-wrapper">

<div class="progress-bar">

<div
class="progress-fill"
id="progressFill">

</div>

</div>

<div class="progress-text">

Step

<span id="stepNumber">

1

</span>

of 4

</div>

</div>

<form id="signupForm">

<!-- =======================
STEP 1
======================= -->

<div
class="step active"
data-step="1">

<h3>

Account Information

</h3>

<div class="form-group">

<label>

Full Name

</label>

<input
type="text"
id="name"
placeholder="Enter your full name"
required>

</div>

<div class="form-group">

<label>

Mobile Number

</label>

<input
type="tel"
id="mobile"
maxlength="10"
placeholder="10 Digit Mobile Number"
required>

</div>

<div class="form-group">

<label>

Email Address

</label>

<input
type="email"
id="email"
placeholder="Enter your email"
required>

</div>

<div class="form-group">

<label>

Password

</label>

<input
type="password"
id="password"
placeholder="Minimum 6 Characters"
required>

</div>

<div class="form-group">

<label>

Confirm Password

</label>

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password"
required>

</div>

<div class="button-row">

<button
type="button"
class="next-btn">

Continue

<i class="fa-solid fa-arrow-right"></i>

</button>

</div>

</div>
    <!-- =======================
STEP 2
======================= -->

<div class="step" data-step="2">

<h3>

Choose Your Gender

</h3>

<div class="gender-grid">

<div class="gender-card"
     data-gender="male">

<i class="fa-solid fa-mars"></i>

<span>Male</span>

</div>

<div class="gender-card"
     data-gender="female">

<i class="fa-solid fa-venus"></i>

<span>Female</span>

</div>

<div class="gender-card"
     data-gender="other">

<i class="fa-solid fa-transgender"></i>

<span>Other</span>

</div>

</div>

<div class="button-row">

<button
type="button"
class="back-btn">

<i class="fa-solid fa-arrow-left"></i>

Back

</button>

<button
type="button"
class="next-btn">

Continue

<i class="fa-solid fa-arrow-right"></i>

</button>

</div>

</div>

<!-- =======================
STEP 3
======================= -->

<div class="step" data-step="3">

<h3>

Choose Your Avatar

</h3>

<p
style="
text-align:center;
color:#ddd;
margin-bottom:20px;">

Select an Avatar
or Upload Your Own Photo

</p>

<div
class="avatar-grid"
id="avatarGrid">

<!-- JavaScript will load avatars here -->

</div>

<input
type="file"
id="photoInput"
accept="image/*"
hidden>

<div class="button-row">

<button
type="button"
class="back-btn">

<i class="fa-solid fa-arrow-left"></i>

Back

</button>

<button
type="button"
class="next-btn">

Continue

<i class="fa-solid fa-arrow-right"></i>

</button>

</div>

</div>
    <!-- =======================
STEP 4
======================= -->

<div class="step" data-step="4">

<h3>

Review & Create Account

</h3>

<!-- Profile Preview -->

<div class="profile-preview">

<img
id="previewImage"
src="assets/avatars/default-avatar.png"
alt="Profile Preview">

</div>

<p
style="
text-align:center;
color:#ddd;
margin:15px 0 25px;">

Please review your details before creating your account.

</p>

<!-- Copyright -->

<label class="checkbox">

<input
type="checkbox"
id="copyrightAgree"
required>

<span>

I confirm that I have the legal right to use the selected or uploaded profile picture. Rio Fun Game is not responsible for user-uploaded images.

</span>

</label>

<!-- Future AdSense -->

<div class="ad-box">

Future Advertisement Space

<br>

(Google AdSense)

</div>

<div class="button-row">

<button
type="button"
class="back-btn">

<i class="fa-solid fa-arrow-left"></i>

Back

</button>

<button
type="submit"
class="create-btn">

<i class="fa-solid fa-user-plus"></i>

Create Account

</button>

</div>

</div>

</form>

<!-- Multi Step JavaScript -->

<script src="js/multistep-signup.js"></script>

</div>

</div>

</body>

</html>
