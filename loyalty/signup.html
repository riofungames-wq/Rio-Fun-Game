<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rio Maggi Point - Create Account</title>

    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF4B2B">
    <link rel="icon" href="favicon.ico">

    <!-- Google Fonts & Font Awesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #FF4B2B 0%, #FF416C 100%);
            --card-bg: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.2);
            --bg-color: #0f0c20;
            --text-color: #ffffff;
            --input-bg: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--bg-color);
            background-image: radial-gradient(circle at top right, #2a0845, transparent),
                              radial-gradient(circle at bottom left, #6441A5, transparent);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 440px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        .header-title {
            text-align: center;
            margin-bottom: 20px;
        }

        .header-title h1 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(45deg, #FF416C, #FF4B2B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-title p {
            font-size: 0.85rem;
            color: #d1d1d1;
            margin-top: 4px;
        }

        /* Avatar & Photo Picker */
        .profile-picker-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }

        .preview-box {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 3px solid #FF4B2B;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 45px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(255, 75, 43, 0.4);
            margin-bottom: 12px;
            position: relative;
        }

        .preview-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .picker-options {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .picker-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .picker-btn.active {
            background: var(--primary-gradient);
            border-color: transparent;
        }

        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 100%;
            margin-top: 8px;
        }

        .avatar-item {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid transparent;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 26px;
            cursor: pointer;
            transition: 0.2s;
        }

        .avatar-item:hover, .avatar-item.selected {
            border-color: #FF4B2B;
            background: rgba(255, 75, 43, 0.2);
        }

        .file-input-wrapper {
            display: none;
            width: 100%;
            text-align: center;
            margin-top: 8px;
        }

        .file-label {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            border: 1px dashed var(--glass-border);
            padding: 10px 15px;
            border-radius: 12px;
            font-size: 0.85rem;
            cursor: pointer;
            width: 100%;
        }

        /* Form Inputs */
        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 6px;
            color: #e0e0e0;
        }

        .input-box {
            width: 100%;
            padding: 12px 14px;
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            transition: 0.3s;
        }

        .input-box:focus {
            border-color: #FF4B2B;
            box-shadow: 0 0 10px rgba(255, 75, 43, 0.3);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary-gradient);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(255, 75, 43, 0.4);
            transition: 0.3s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #bbb;
        }

        .login-link a {
            color: #FF416C;
            text-decoration: none;
            font-weight: 600;
        }

        /* Notifications */
        .msg-box {
            display: none;
            padding: 10px;
            border-radius: 10px;
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 15px;
        }

        .msg-box.error {
            display: block;
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid rgba(255, 0, 0, 0.4);
            color: #ff8080;
        }

        .msg-box.success {
            display: block;
            background: rgba(0, 255, 0, 0.2);
            border: 1px solid rgba(0, 255, 0, 0.4);
            color: #80ff80;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header-title">
            <h1>Create Account</h1>
            <p>Join Rio Maggi Point Loyalty Program</p>
        </div>

        <div id="msgBox" class="msg-box"></div>

        <form id="signupForm">
            <!-- Avatar / Photo Picker -->
            <div class="profile-picker-container">
                <div class="preview-box" id="profilePreview">😊</div>

                <div class="picker-options">
                    <button type="button" class="picker-btn active" id="btnAvatarTab">Avatar</button>
                    <button type="button" class="picker-btn" id="btnPhotoTab">Upload Photo</button>
                </div>

                <!-- Avatar Options Grid -->
                <div class="avatar-grid" id="avatarGrid">
                    <div class="avatar-item selected" data-avatar="😊">😊</div>
                    <div class="avatar-item" data-avatar="🥰">🥰</div>
                    <div class="avatar-item" data-avatar="😍">😍</div>
                    <div class="avatar-item" data-avatar="😎">😎</div>
                    <div class="avatar-item" data-avatar="🤗">🤗</div>
                    <div class="avatar-item" data-avatar="😇">😇</div>
                    <div class="avatar-item" data-avatar="🧑‍🍳">🧑‍🍳</div>
                    <div class="avatar-item" data-avatar="👩‍🍳">👩‍🍳</div>
                </div>

                <!-- Custom Photo File Input -->
                <div class="file-input-wrapper" id="fileWrapper">
                    <label class="file-label" for="photoInput">
                        <i class="fa-solid fa-cloud-arrow-up"></i> Choose Image File
                    </label>
                    <input type="file" id="photoInput" accept="image/*" style="display: none;">
                </div>
            </div>

            <!-- Full Name -->
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" class="input-box" placeholder="Enter full name" required>
            </div>

            <!-- Mobile -->
            <div class="form-group">
                <label for="mobile">Mobile Number</label>
                <input type="tel" id="mobile" class="input-box" placeholder="10-digit mobile number" maxlength="10" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,'')" required>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="input-box" placeholder="Enter email" required>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="input-box" placeholder="Minimum 6 characters" required>
            </div>

            <!-- Confirm Password -->
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" class="input-box" placeholder="Confirm password" required>
            </div>

            <button type="submit" id="signupBtn" class="submit-btn">Create Account</button>
        </form>

        <div class="login-link">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

    <!-- Firebase Script -->
    <script type="module">
        import { firebaseConfig } from './firebase-config.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, query, where, getDocs, serverTimestamp, Timestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // UI References
        const signupForm = document.getElementById("signupForm");
        const signupBtn = document.getElementById("signupBtn");
        const msgBox = document.getElementById("msgBox");
        const profilePreview = document.getElementById("profilePreview");
        
        const btnAvatarTab = document.getElementById("btnAvatarTab");
        const btnPhotoTab = document.getElementById("btnPhotoTab");
        const avatarGrid = document.getElementById("avatarGrid");
        const fileWrapper = document.getElementById("fileWrapper");
        const photoInput = document.getElementById("photoInput");

        let selectedAvatar = "😊";
        let uploadedPhotoBase64 = "";

        // Toggle Avatar / Photo Tabs
        btnAvatarTab.addEventListener('click', () => {
            btnAvatarTab.classList.add('active');
            btnPhotoTab.classList.remove('active');
            avatarGrid.style.display = 'grid';
            fileWrapper.style.display = 'none';
            if(!uploadedPhotoBase64) {
                profilePreview.innerHTML = selectedAvatar;
            }
        });

        btnPhotoTab.addEventListener('click', () => {
            btnPhotoTab.classList.add('active');
            btnAvatarTab.classList.remove('active');
            avatarGrid.style.display = 'none';
            fileWrapper.style.display = 'block';
        });

        // Avatar Selection
        document.querySelectorAll('.avatar-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.avatar-item').forEach(i => i.classList.remove('selected'));
                item.classList.add('selected');
                selectedAvatar = item.dataset.avatar;
                uploadedPhotoBase64 = ""; // Reset custom photo if avatar chosen
                profilePreview.innerHTML = selectedAvatar;
            });
        });

        // Handle Image File Upload (Base64)
        photoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 1024 * 1024) { // 1MB Limit
                    showMsg("Image size should be less than 1MB", "error");
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(event) {
                    uploadedPhotoBase64 = event.target.result;
                    profilePreview.innerHTML = `<img src="${uploadedPhotoBase64}" alt="Profile">`;
                };
                reader.readAsDataURL(file);
            }
        });

        function showMsg(message, type) {
            msgBox.textContent = message;
            msgBox.className = "msg-box " + type;
        }

        // Form Submit
        signupForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const name = document.getElementById("name").value.trim();
            const mobile = document.getElementById("mobile").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;

            if (name.length < 3) return showMsg("Please enter a valid name.", "error");
            if (!/^[0-9]{10}$/.test(mobile)) return showMsg("Please enter a valid 10-digit mobile number.", "error");
            if (password.length < 6) return showMsg("Password must be at least 6 characters.", "error");
            if (password !== confirmPassword) return showMsg("Passwords do not match.", "error");

            try {
                signupBtn.disabled = true;
                signupBtn.textContent = "Creating Account...";

                // Check Mobile Duplicates
                const q = query(collection(db, "customers"), where("mobile", "==", mobile));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    showMsg("This mobile number is already registered.", "error");
                    signupBtn.disabled = false;
                    signupBtn.textContent = "Create Account";
                    return;
                }

                // Auth Creation
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Dates
                const cycleStartDate = new Date();
                const cycleExpiryDate = new Date();
                cycleExpiryDate.setDate(cycleExpiryDate.getDate() + 40);

                // Save to Firestore
                await setDoc(doc(db, "customers", user.uid), {
                    uid: user.uid,
                    name: name,
                    mobile: mobile,
                    email: email,
                    avatar: selectedAvatar,
                    photoURL: uploadedPhotoBase64 || "",
                    stamps: 0,
                    reward: false,
                    rewardUnlocked: false,
                    rewardRedeemed: false,
                    status: "active",
                    cycleStartDate: Timestamp.fromDate(cycleStartDate),
                    cycleExpiryDate: Timestamp.fromDate(cycleExpiryDate),
                    createdAt: serverTimestamp(),
                    updatedAt: serverTimestamp()
                });

                showMsg("🎉 Account Created Successfully!", "success");
                setTimeout(() => { window.location.href = "index.html"; }, 1200);

            } catch (error) {
                console.error("Signup Error:", error);
                showMsg(error.message || "Something went wrong.", "error");
            } finally {
                signupBtn.disabled = false;
                signupBtn.textContent = "Create Account";
            }
        });
    </script>
</body>

</html>
