<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Account | Rio Maggi Point</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#D4AF37">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- Global CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="page">

<div class="container">

<div class="card">

<!-- Header -->

<div class="logo">

<img src="assets/logo/logo.png" alt="Rio Maggi Point Logo">

<div>

<h2>Create Account</h2>

<p>Join Rio Maggi Point Loyalty Program</p>

</div>

</div>

<!-- Message Box -->

<div id="msgBox"
style="display:none;margin-top:20px;"></div>

<!-- Signup Form -->

<form id="signupForm">

<!-- Profile Preview -->

<div
style="display:flex;justify-content:center;margin:25px 0;">

<div id="profilePreview"

style="width:100px;
height:100px;
border-radius:50%;
border:4px solid var(--primary);
overflow:hidden;
background:#fff;
display:flex;
align-items:center;
justify-content:center;">

<img
id="previewImage"
src="assets/avatars/boy-01.png"
alt="Avatar"

style="width:100%;
height:100%;
object-fit:cover;">

</div>

</div>
<!-- Avatar Type -->

<h3 style="margin-bottom:15px;">Choose Avatar</h3>

<div style="display:flex;gap:10px;margin-bottom:20px;">

<button type="button"
class="btn"
id="boyBtn"
style="flex:1;">
Boy
</button>

<button type="button"
class="btn"
id="girlBtn"
style="flex:1;">
Girl
</button>

</div>

<!-- Avatar Grid -->

<div class="avatar-grid" id="avatarGrid">

<div class="avatar-item selected">
<img src="assets/avatars/boy-01.png" data-avatar="boy-01.png">
</div>

<div class="avatar-item">
<img src="assets/avatars/boy-02.png" data-avatar="boy-02.png">
</div>

<div class="avatar-item">
<img src="assets/avatars/boy-03.png" data-avatar="boy-03.png">
</div>

<div class="avatar-item">
<img src="assets/avatars/boy-04.png" data-avatar="boy-04.png">
</div>

<div class="avatar-item">
<img src="assets/avatars/boy-05.png" data-avatar="boy-05.png">
</div>

<div class="avatar-item">
<img src="assets/avatars/boy-06.png" data-avatar="boy-06.png">
</div>

<div class="avatar-item">
<img src="assets/avatars/boy-07.png" data-avatar="boy-07.png">
</div>

<div class="avatar-item">
<img src="assets/avatars/boy-08.png" data-avatar="boy-08.png">
</div>

</div>

<!-- Upload Photo -->

<div class="upload-box" style="margin-top:20px;">

<i class="fa-solid fa-camera"></i>

<p>Or Upload Your Own Photo</p>

<input
type="file"
id="photoInput"
accept="image/*"
style="margin-top:10px;">

</div>

<!-- Full Name -->

<div class="form-group">

<label>Full Name</label>

<input
type="text"
id="name"
class="input-box"
placeholder="Enter your full name"
required>

</div>

<!-- Mobile -->

<div class="form-group">

<label>Mobile Number</label>

<input
type="tel"
id="mobile"
class="input-box"
maxlength="10"
placeholder="Enter 10 digit mobile number"
required>

</div>
<!-- Email -->

<div class="form-group">

<label>Email Address</label>

<input
type="email"
id="email"
class="input-box"
placeholder="Enter your email"
required>

</div>

<!-- Password -->

<div class="form-group">

<label>Password</label>

<input
type="password"
id="password"
class="input-box"
placeholder="Minimum 6 characters"
required>

</div>

<!-- Confirm Password -->

<div class="form-group">

<label>Confirm Password</label>

<input
type="password"
id="confirmPassword"
class="input-box"
placeholder="Re-enter password"
required>

</div>

<!-- Create Account Button -->

<button
type="submit"
class="btn"
id="signupBtn">

<i class="fa-solid fa-user-plus"></i>

&nbsp;

Create Account

</button>

</form>

<!-- Login -->

<p
style="
text-align:center;
margin-top:20px;">

Already have an account?

<a
href="login.html"
style="
font-weight:700;
color:var(--primary-dark);">

Login

</a>

</p>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import { firebaseConfig } from "./js/firebase-config.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Avatar Selection

let selectedAvatar = "boy-01.png";

document.querySelectorAll(".avatar-item").forEach(item => {

    item.addEventListener("click", () => {

        document.querySelectorAll(".avatar-item").forEach(i=>i.classList.remove("selected"));

        item.classList.add("selected");

        const img = item.querySelector("img");

        selectedAvatar = img.dataset.avatar;

        document.getElementById("previewImage").src = img.src;

    });

});

// Photo Upload

const photoInput = document.getElementById("photoInput");

photoInput.addEventListener("change",(e)=>{

    const file=e.target.files[0];

    if(!file) return;

    const reader=new FileReader();

    reader.onload=function(ev){

        document.getElementById("previewImage").src=ev.target.result;

    }

    reader.readAsDataURL(file);

});

// Signup

const signupForm=document.getElementById("signupForm");

signupForm.addEventListener("submit",async(e)=>{

e.preventDefault();

const name=document.getElementById("name").value.trim();

const mobile=document.getElementById("mobile").value.trim();

const email=document.getElementById("email").value.trim();

const password=document.getElementById("password").value;

const confirmPassword=document.getElementById("confirmPassword").value;

if(password!==confirmPassword){

alert("Passwords do not match.");

return;

}

try{

const userCredential=await createUserWithEmailAndPassword(auth,email,password);

const user=userCredential.user;

await setDoc(doc(db,"customers",user.uid),{

uid:user.uid,

name:name,

mobile:mobile,

email:email,

avatar:selectedAvatar,

photoURL:"",

stamps:0,

reward:false,

rewardUnlocked:false,

rewardRedeemed:false,

status:"active",

createdAt:serverTimestamp(),

updatedAt:serverTimestamp()

});

window.location.href="index.html";

}

catch(error){

alert(error.message);

}

});

</script>

</div>

</div>

</div>

</body>

</html>
