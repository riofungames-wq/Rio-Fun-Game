<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rio Maggi Point - Contact Us</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    background: #050505;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

.container {
    width: 100%;
    max-width: 500px;
    background: #f5d99b;
    border: 3px solid #d19b4a;
    border-radius: 18px;
    padding: 30px;
    box-shadow: 0 15px 40px rgba(0, 0, 0, .45);
}

h1 {
    text-align: center;
    color: #222;
    margin-bottom: 10px;
}

.subtitle {
    text-align: center;
    color: #555;
    margin-bottom: 25px;
}

.card {
    background: #fff7df;
    border: 2px solid #d19b4a;
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 18px;
}

.label {
    font-size: 13px;
    font-weight: bold;
    color: #555;
    margin-bottom: 5px;
}

.value {
    font-size: 17px;
    font-weight: bold;
    color: #222;
    word-break: break-word;
}

.bannerAd {
    height: 90px;
    border: 2px dashed #999;
    border-radius: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #ffffff;
    margin: 20px 0;
    font-weight: bold;
    color: #777;
}

button {
    width: 100%;
    padding: 14px;
    background: #263525;
    color: #ffd54f;
    border: none;
    border-radius: 10px;
    font-size: 17px;
    font-weight: bold;
    cursor: pointer;
    transition: .25s;
}

button:hover {
    background: #1c271b;
}
</style>

</head>

<body>

<div class="container">

<h1>📞 Contact Us</h1>

<p class="subtitle">
    We're Always Happy To Help You
</p>

<div class="card">
    <div class="label">📞 Phone Number</div>
    <div class="value">+91 XXXXXXXXXX</div>
</div>

<div class="card">
    <div class="label">📧 Email Address</div>
    <div class="value">support@riomaggipoint.com</div>
</div>

<div class="card">
    <div class="label">🕒 Business Hours</div>
    <div class="value">Everyday<br>10:00 AM - 10:00 PM</div>
</div>

<div class="bannerAd">
    Google AdSense Banner (728×90 / Responsive)
</div>

<button id="homeBtn">
    ⬅ Back to Home
</button>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    // Login check
    const customer = JSON.parse(
        localStorage.getItem("currentCustomer")
    );

    if (!customer) {
        alert("Please Login First!");
        window.location.href = "login.html";
        return;
    }

    // Back Button
    document.getElementById("homeBtn").addEventListener("click", () => {
        window.location.href = "index.html";
    });
});
</script>

</body>
</html>
