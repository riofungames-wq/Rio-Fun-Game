<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rio Maggi Point - Feedback</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    background: #050505;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

.container {
    width: 100%;
    max-width: 550px;
    background: #f5d99b;
    border: 3px solid #d19b4a;
    border-radius: 18px;
    padding: 30px;
    box-shadow: 0 15px 40px rgba(0,0,0,.45);
}

h1 {
    text-align: center;
    color: #222;
    margin-bottom: 10px;
}

.subtitle {
    text-align: center;
    color: #555;
    margin-bottom: 25px;
}

.card {
    background: #fff7df;
    border: 2px solid #d19b4a;
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 18px;
}

label {
    display: block;
    font-weight: bold;
    margin-bottom: 8px;
    color: #222;
}

select,
textarea {
    width: 100%;
    padding: 12px;
    border: 2px solid #d19b4a;
    border-radius: 10px;
    font-size: 15px;
    outline: none;
    margin-top: 5px;
}

textarea {
    resize: vertical;
    min-height: 120px;
}

.bannerAd {
    height: 90px;
    border: 2px dashed #999;
    border-radius: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #ffffff;
    margin: 20px 0;
    font-weight: bold;
    color: #777;
}

button {
    width: 100%;
    padding: 14px;
    background: #263525;
    color: #ffd54f;
    border: none;
    border-radius: 10px;
    font-size: 17px;
    font-weight: bold;
    cursor: pointer;
    transition: .25s;
}

button:hover {
    background: #1c271b;
}
</style>

</head>

<body>

<div class="container">

<h1>⭐ Customer Feedback</h1>

<p class="subtitle">
Tell us how your Rio Maggi Point experience was.
</p>

<div class="card">
    <label for="rating">Rate Your Experience</label>
    <select id="rating" required>
        <option value="">Select Rating</option>
        <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
        <option value="4">⭐⭐⭐⭐ Very Good</option>
        <option value="3">⭐⭐⭐ Good</option>
        <option value="2">⭐⭐ Average</option>
        <option value="1">⭐ Poor</option>
    </select>
</div>

<div class="card">
    <label for="experience">How was your Maggi?</label>
    <select id="experience" required>
        <option value="">Select Option</option>
        <option>😍 It was Amazing!</option>
        <option>😊 Very Good</option>
        <option>🙂 Good</option>
        <option>😐 Average</option>
        <option>😔 Needs Improvement</option>
        <option>🔥 I'll Definitely Visit Again</option>
    </select>
</div>

<div class="card">
    <label for="comment">Your Feedback</label>
    <textarea
        id="comment"
        placeholder="Write your valuable feedback here..."
        maxlength="300"
    ></textarea>
</div>

<div class="bannerAd">
    Google AdSense Banner (Responsive)
</div>

<button id="submitBtn">
    Submit Feedback
</button>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const customer = JSON.parse(
        localStorage.getItem("currentCustomer")
    );

    if (!customer) {
        alert("Please Login First!");
        window.location.href = "login.html";
        return;
    }

    document.getElementById("submitBtn").addEventListener("click", () => {

        const rating = document.getElementById("rating").value;
        const experience = document.getElementById("experience").value;
        const comment = document.getElementById("comment").value.trim();

        if (rating === "" || experience === "") {
            alert("Please complete the feedback form.");
            return;
        }

        let feedbacks = JSON.parse(localStorage.getItem("feedbacks")) || [];

        feedbacks.push({
            customerId: customer.id,
            name: customer.name,
            mobile: customer.mobile,
            rating: rating,
            experience: experience,
            comment: comment,
            date: new Date().toLocaleString()
        });

        localStorage.setItem("feedbacks", JSON.stringify(feedbacks));

        alert("🎉 Thank you for your valuable feedback!");

        window.location.href = "profile.html";

    });

});
</script>

</body>
</html>
