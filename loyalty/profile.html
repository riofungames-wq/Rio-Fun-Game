<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rio Maggi Point - My Profile</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: #f5d99b;
            border: 3px solid #d19b4a;
            border-radius: 18px;
            padding: 30px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, .45);
        }

        h1 {
            text-align: center;
            color: #222;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #555;
            margin-bottom: 25px;
        }

        .card {
            background: #fff7df;
            border: 2px solid #d19b4a;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .label {
            font-size: 13px;
            font-weight: bold;
            color: #555;
            margin-bottom: 4px;
        }

        .value {
            font-size: 18px;
            font-weight: bold;
            color: #222;
            word-break: break-word;
        }

        .reward {
            text-align: center;
            background: #c62828;
            color: #fff;
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
            font-weight: bold;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 14px;
            background: #263525;
            color: #ffd54f;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: .25s;
        }

        button:hover {
            background: #1c271b;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>👤 My Profile</h1>

    <p class="subtitle">
        Rio Maggi Point Loyalty Member
    </p>

    <div class="card">
        <div class="label">Full Name</div>
        <div class="value" id="customerName">Loading...</div>
    </div>

    <div class="card">
        <div class="label">Mobile Number</div>
        <div class="value" id="customerMobile">Loading...</div>
    </div>

    <div class="card">
        <div class="label">Email</div>
        <div class="value" id="customerEmail">Loading...</div>
    </div>

    <div class="card">
        <div class="label">Total Stamps</div>
        <div class="value" id="customerStamps">0 / 6</div>
    </div>

    <div class="reward" id="rewardBox">
        🎁 Reward Locked
    </div>

    <button id="logoutBtn">
        Logout
    </button>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const customer = JSON.parse(
        localStorage.getItem("currentCustomer")
    );

    if (!customer) {
        alert("Please Login First!");
        window.location.href = "login.html";
        return;
    }

    document.getElementById("customerName").textContent = customer.name;
    document.getElementById("customerMobile").textContent = customer.mobile;
    document.getElementById("customerEmail").textContent = customer.email || "Not Provided";
    document.getElementById("customerStamps").textContent = customer.stamps + " / 6";

    const rewardBox = document.getElementById("rewardBox");

    if (customer.reward === true) {
        rewardBox.innerHTML = "🎉 Congratulations! Your FREE Veg Maggi is Ready!";
        rewardBox.style.background = "#2e7d32";
    } else {
        rewardBox.innerHTML = "🔒 Collect 6 Stamps to Unlock Your FREE Veg Maggi!";
    }

    document.getElementById("logoutBtn").addEventListener("click", () => {
        localStorage.removeItem("currentCustomer");
        alert("Logged Out Successfully!");
        window.location.href = "login.html";
    });
});
</script>

</body>
</html>
