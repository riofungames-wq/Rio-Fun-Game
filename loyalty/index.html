<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rio Maggi Point - Loyalty Card</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f5d99b">

    <!-- Google Fonts & Font Awesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-bg: #f5d99b;
            --card-bg: #fff8e7;
            --accent-color: #d19b4a;
            --text-dark: #3a2e2b;
            --text-muted: #7a6855;
            --border-color: #e0be7b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 90px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        /* Header Bar */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .header h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .logout-btn {
            background: rgba(209, 155, 74, 0.2);
            border: 1px solid var(--border-color);
            color: var(--text-dark);
            padding: 8px 14px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
        }

        /* Card Container */
        .loyalty-card {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .avatar-box {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--primary-bg);
            border: 2px solid var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            overflow: hidden;
        }

        .avatar-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-info h3 {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .user-info p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Stamp Grid */
        .stamp-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .stamp-box {
            aspect-ratio: 1;
            background: rgba(245, 217, 155, 0.4);
            border: 1.5px dashed var(--accent-color);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--accent-color);
            font-weight: bold;
        }

        .stamp-box.active {
            background: var(--accent-color);
            color: #fff;
            border-style: solid;
        }

        /* Bottom Navigation Bar */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            border-top: 2px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            z-index: 1000;
        }

        .nav-item {
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.75rem;
            gap: 4px;
            cursor: pointer;
            font-weight: 600;
        }

        .nav-item i {
            font-size: 1.2rem;
        }

        .nav-item.active, .nav-item:hover {
            color: var(--accent-color);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <h2>Rio Maggi Point</h2>
            <button class="logout-btn" id="logoutBtn">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </button>
        </header>

        <!-- Loyalty Card -->
        <div class="loyalty-card">
            <div class="profile-section">
                <div class="avatar-box" id="avatarDisplay">
                    <span id="emojiAvatar">😊</span>
                    <img id="imageAvatar" style="display:none;" alt="Profile">
                </div>
                <div class="user-info">
                    <h3 id="userName">Loading...</h3>
                    <p id="userEmail">Loading...</p>
                </div>
            </div>

            <div class="stamp-grid" id="stampContainer">
                <!-- Stamps generated via JS -->
            </div>
        </div>
    </div>

    <!-- Bottom Navigation Bar -->
    <nav class="bottom-nav">
        <a class="nav-item active" href="index.html">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </a>
        <a class="nav-item" href="qr.html">
            <i class="fa-solid fa-qrcode"></i>
            <span>QR</span>
        </a>
        <a class="nav-item" href="history.html">
            <i class="fa-solid fa-clock-rotate-left"></i>
            <span>History</span>
        </a>
        <a class="nav-item" href="profile.html">
            <i class="fa-solid fa-user"></i>
            <span>Profile</span>
        </a>
    </nav>

    <!-- Firebase Script -->
    <script type="module">
        import { firebaseConfig } from './firebase-config.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const userName = document.getElementById("userName");
        const userEmail = document.getElementById("userEmail");
        const emojiAvatar = document.getElementById("emojiAvatar");
        const imageAvatar = document.getElementById("imageAvatar");
        const stampContainer = document.getElementById("stampContainer");
        const logoutBtn = document.getElementById("logoutBtn");

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "login.html";
                return;
            }

            try {
                const docRef = doc(db, "customers", user.uid);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    userName.textContent = data.name || "Customer";
                    userEmail.textContent = data.email || user.email;

                    if (data.photoURL) {
                        imageAvatar.src = data.photoURL;
                        imageAvatar.style.display = "block";
                        emojiAvatar.style.display = "none";
                    } else if (data.avatar) {
                        emojiAvatar.textContent = data.avatar;
                    }

                    renderStamps(data.stamps || 0);
                }
            } catch (err) {
                console.error("Error loading user data:", err);
            }
        });

        function renderStamps(count) {
            stampContainer.innerHTML = "";
            for (let i = 1; i <= 10; i++) {
                const stamp = document.createElement("div");
                stamp.className = `stamp-box ${i <= count ? "active" : ""}`;
                stamp.innerHTML = i <= count ? '<i class="fa-solid fa-check"></i>' : i;
                stampContainer.appendChild(stamp);
            }
        }

        logoutBtn.addEventListener("click", () => {
            signOut(auth).then(() => {
                window.location.href = "login.html";
            });
        });
    </script>
</body>
</html>
