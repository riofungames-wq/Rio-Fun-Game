<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rio Maggi Point - Loyalty Program</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF4B2B">

    <!-- Google Fonts & Font Awesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #FF4B2B 0%, #FF416C 100%);
            --gold-gradient: linear-gradient(135deg, #FFE000 0%, #799F0C 100%);
            --card-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.25);
            --bg-color: #0f0c20;
            --text-color: #ffffff;
            --text-sub: #d1d1d1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--bg-color);
            background-image: radial-gradient(circle at top right, #2a0845, transparent),
                              radial-gradient(circle at bottom left, #6441A5, transparent);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 80px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        /* Header / Profile Bar */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar-img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #FF4B2B;
            box-shadow: 0 0 10px rgba(255, 75, 43, 0.5);
        }

        .user-info h3 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .user-info p {
            font-size: 0.8rem;
            color: var(--text-sub);
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 8px 12px;
            border-radius: 12px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255, 75, 43, 0.3);
        }

        /* Loyalty Card (Glassmorphism) */
        .loyalty-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            position: relative;
            overflow: hidden;
            margin-bottom: 24px;
        }

        .card-brand {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .brand-title {
            font-size: 1.2rem;
            font-weight: 700;
            background: linear-gradient(45deg, #FF416C, #FF4B2B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .cycle-badge {
            font-size: 0.75rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
        }

        /* Stamp Grid */
        .stamp-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stamp-box {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.3);
            transition: all 0.4s ease;
            position: relative;
        }

        .stamp-box.active {
            background: var(--primary-gradient);
            border: none;
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 75, 43, 0.4);
            transform: scale(1.05);
            animation: popIn 0.3s ease-out;
        }

        .stamp-number {
            font-size: 0.65rem;
            position: absolute;
            top: 6px;
            left: 8px;
            opacity: 0.6;
        }

        @keyframes popIn {
            0% { transform: scale(0.8); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1.05); }
        }

        /* Reward Banner */
        .reward-banner {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        .reward-banner.unlocked {
            background: var(--gold-gradient);
            color: #000;
            font-weight: 600;
            box-shadow: 0 0 20px rgba(255, 224, 0, 0.5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 224, 0, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 224, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 224, 0, 0); }
        }

        .reward-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .reward-desc {
            font-size: 0.95rem;
            font-weight: 600;
        }

        /* Feedback Section */
        .feedback-section {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid var(--glass-border);
            margin-bottom: 24px;
        }

        .feedback-section h4 {
            font-size: 0.95rem;
            margin-bottom: 15px;
            font-weight: 400;
        }

        .feedback-btns {
            display: flex;
            justify-content: space-around;
            gap: 10px;
        }

        .fb-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 10px 14px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.3s;
            flex: 1;
            justify-content: center;
        }

        .fb-btn:hover, .fb-btn.selected {
            background: #FF4B2B;
            border-color: #FF4B2B;
            transform: translateY(-2px);
        }

        /* Bottom Navigation Bar */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 420px;
            background: rgba(15, 12, 32, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            z-index: 1000;
        }

        .nav-item {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.75rem;
            gap: 4px;
            transition: 0.3s;
            cursor: pointer;
        }

        .nav-item i {
            font-size: 1.2rem;
        }

        .nav-item.active, .nav-item:hover {
            color: #FF4B2B;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="user-profile">
                <img id="userAvatar" src="https://via.placeholder.com/150" alt="Avatar" class="avatar-img">
                <div class="user-info">
                    <h3 id="userName">Loading...</h3>
                    <p id="cycleStatus">40 Days Cycle Active</p>
                </div>
            </div>
            <button class="logout-btn" id="logoutBtn" title="Logout">
                <i class="fa-solid fa-right-from-bracket"></i>
            </button>
        </header>

        <!-- Loyalty Card -->
        <div class="loyalty-card">
            <div class="card-brand">
                <span class="brand-title">Rio Maggi Point</span>
                <span class="cycle-badge" id="daysLeft">-- Days Left</span>
            </div>

            <!-- 6 Stamp Grid -->
            <div class="stamp-grid" id="stampGrid">
                <div class="stamp-box" data-stamp="1">
                    <span class="stamp-number">#1</span>
                    <i class="fa-solid fa-bowl-rice"></i>
                </div>
                <div class="stamp-box" data-stamp="2">
                    <span class="stamp-number">#2</span>
                    <i class="fa-solid fa-bowl-rice"></i>
                </div>
                <div class="stamp-box" data-stamp="3">
                    <span class="stamp-number">#3</span>
                    <i class="fa-solid fa-bowl-rice"></i>
                </div>
                <div class="stamp-box" data-stamp="4">
                    <span class="stamp-number">#4</span>
                    <i class="fa-solid fa-bowl-rice"></i>
                </div>
                <div class="stamp-box" data-stamp="5">
                    <span class="stamp-number">#5</span>
                    <i class="fa-solid fa-bowl-rice"></i>
                </div>
                <div class="stamp-box" data-stamp="6">
                    <span class="stamp-number">#6</span>
                    <i class="fa-solid fa-bowl-rice"></i>
                </div>
            </div>

            <!-- Reward Banner -->
            <div class="reward-banner" id="rewardBanner">
                <div class="reward-title" id="rewardStatus">Complete 6 Stamps</div>
                <div class="reward-desc" id="rewardText">🎁 7th Visit: Free Veg Maggi!</div>
            </div>
        </div>

        <!-- Feedback Section -->
        <div class="feedback-section">
            <h4>How was your last visit?</h4>
            <div class="feedback-btns">
                <button class="fb-btn" onclick="sendFeedback('Good')">
                    <i class="fa-regular fa-face-smile"></i> Good
                </button>
                <button class="fb-btn" onclick="sendFeedback('Lovely')">
                    <i class="fa-regular fa-face-laugh-beam"></i> Lovely
                </button>
                <button class="fb-btn" onclick="sendFeedback('I Love This')">
                    <i class="fa-regular fa-face-heart"></i> Love It
                </button>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a class="nav-item active" href="index.html">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </a>
        <a class="nav-item" href="qr.html">
            <i class="fa-solid fa-qrcode"></i>
            <span>QR</span>
        </a>
        <a class="nav-item" href="history.html">
            <i class="fa-solid fa-clock-rotate-left"></i>
            <span>History</span>
        </a>
        <a class="nav-item" href="profile.html">
            <i class="fa-solid fa-user"></i>
            <span>Profile</span>
        </a>
    </nav>

    <!-- Firebase & Logic Script -->
    <script type="module">
        import { firebaseConfig } from './firebase-config.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUserDocRef = null;

        // Auth State Check
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUserDocRef = doc(db, "customers", user.uid);
                loadUserData(currentUserDocRef);
            } else {
                window.location.href = "login.html";
            }
        });

        // Load Customer Data
        async function loadUserData(docRef) {
            try {
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    const data = docSnap.data();

                    // Render Profile
                    document.getElementById('userName').innerText = data.name || "Customer";
                    document.getElementById('userAvatar').src = data.photoURL || data.avatar || "https://via.placeholder.com/150";

                    // Render Stamps & 7th Stamp Logic
                    renderStamps(data.stamps || 0);

                    // Render Cycle Expiry
                    calculateExpiry(data.cycleExpiryDate);
                }
            } catch (error) {
                console.error("Error fetching user data:", error);
            }
        }

        // Render Stamp UI Logic
        function renderStamps(count) {
            const boxes = document.querySelectorAll('.stamp-box');
            boxes.forEach((box, index) => {
                if (index < count) {
                    box.classList.add('active');
                    box.innerHTML = `<span class="stamp-number">#${index + 1}</span><i class="fa-solid fa-circle-check"></i>`;
                } else {
                    box.classList.remove('active');
                    box.innerHTML = `<span class="stamp-number">#${index + 1}</span><i class="fa-solid fa-bowl-rice"></i>`;
                }
            });

            // Reward Status (6 Stamps Completed -> 7th Visit Free Maggi)
            const rewardBanner = document.getElementById('rewardBanner');
            const rewardStatus = document.getElementById('rewardStatus');
            const rewardText = document.getElementById('rewardText');

            if (count >= 6) {
                rewardBanner.classList.add('unlocked');
                rewardStatus.innerText = "🎉 REWARD UNLOCKED!";
                rewardText.innerText = "Show this on 7th visit for Free Veg Maggi!";
            } else {
                rewardBanner.classList.remove('unlocked');
                rewardStatus.innerText = `Collect ${6 - count} More Stamps`;
                rewardText.innerText = "🎁 7th Visit: Free Veg Maggi!";
            }
        }

        // Days Remaining Logic
        function calculateExpiry(expiryTimestamp) {
            if (!expiryTimestamp) return;
            const expiryDate = expiryTimestamp.toDate ? expiryTimestamp.toDate() : new Date(expiryTimestamp);
            const now = new Date();
            const diffTime = expiryDate - now;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            const daysLeftElem = document.getElementById('daysLeft');
            if (diffDays > 0) {
                daysLeftElem.innerText = `${diffDays} Days Left`;
            } else {
                daysLeftElem.innerText = `Cycle Expired`;
                daysLeftElem.style.background = `rgba(255, 0, 0, 0.3)`;
            }
        }

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.href = "login.html";
            });
        });

        // Global Feedback Function
        window.sendFeedback = async function(type) {
            if (!currentUserDocRef) return;
            try {
                await updateDoc(currentUserDocRef, { feedback: type });
                alert(`Thank you for your feedback: ${type}!`);
            } catch (e) {
                console.error("Error saving feedback:", e);
            }
        };

        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log("Service Worker Registered"))
                .catch(err => console.error("SW Registration Failed:", err));
        }
    </script>
</body>
</html>
